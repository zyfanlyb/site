# 示例：主站为 VitePress 静态目录时，保证 robots / sitemap 不被其它 SPA 的 try_files 吞掉。
# 把两处 /path/to/.../dist 改成服务器上 front_service 构建产物目录（即仓库内 .vitepress/dist）。
#
# 若 Nginx 的 root 已指向该 dist，且 / 没有错误回退到 CMS 前端，一般可省略下面两个 location。

server {
    listen 443 ssl;
    server_name www.zyfan.top zyfan.top;

    # ssl_certificate ...;

    location = /robots.txt {
        alias /path/to/front_service/.vitepress/dist/robots.txt;
        default_type text/plain;
        access_log off;
    }

    location = /sitemap.xml {
        alias /path/to/front_service/.vitepress/dist/sitemap.xml;
        default_type application/xml;
        access_log off;
    }

    # 与现有配置合并时保留你原有的 location / 与反代规则
}
